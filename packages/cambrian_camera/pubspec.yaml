name: cambrian_camera
description: Flutter plugin for Cambrian camera with Camera2 backend and C++ post-processing.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_plugin_android_lifecycle: ^2.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^22.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.cambrian.camera
        pluginClass: CambrianCameraPlugin
      ios:
        pluginClass: CambrianCameraPlugin
